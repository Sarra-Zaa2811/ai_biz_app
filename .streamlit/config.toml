[theme]
base            = "dark"
primaryColor    = "#00d4ff"
backgroundColor = "#0d0f14"
secondaryBackgroundColor = "#161920"
textColor       = "#e2e8f0"
font            = "sans serif"

[server]
headless        = true
enableCORS      = false
enableXsrfProtection = true

[runner]
magicEnabled    = false

[browser]
gatherUsageStats = false
