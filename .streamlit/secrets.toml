# .streamlit/secrets.toml
# Used on Streamlit Community Cloud.
# ⚠ Add this file to .gitignore — never commit real credentials!
#
# Paste your credentials here when deploying on Streamlit Cloud:
# (Settings → Secrets in your app dashboard)

DAGSHUB_USERNAME  = "YOUR_USERNAME"
DAGSHUB_TOKEN     = "YOUR_TOKEN"
DAGSHUB_REPO_NAME = "YOUR_REPO_NAME"
GOOGLE_API_KEY    = "YOUR_GEMINI_KEY"
